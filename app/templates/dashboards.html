<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>{{ app_name }}</title>

    <!-- Bootstrap simple desde CDN para arrancar prolijo.
         Más adelante podemos descargarlo local si hace falta offline total. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <main class="container py-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="mb-3">🐎 {{ app_name }}</h1>
                <p class="text-muted">Versión: {{ version }}</p>

                <hr>

                <h4>Estado del sistema</h4>

                <ul class="list-group mt-3">
                    <li class="list-group-item">✔ Base de datos: {{ database_status }}</li>
                    <li class="list-group-item">✔ Logger: {{ logger_status }}</li>
                    <li class="list-group-item">✔ FastAPI: {{ api_status }}</li>
                </ul>

                <div class="mt-4">
                    <button class="btn btn-primary" disabled>Ingresar próximamente</button>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
